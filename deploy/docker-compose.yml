services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shipyard
      POSTGRES_USER: shipyard
      POSTGRES_PASSWORD: shipyard
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shipyard -d shipyard"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ..
      dockerfile: deploy/rust.Dockerfile
      args:
        BIN: shipyard-api
    environment:
      DATABASE_URL: postgres://shipyard:shipyard@postgres:5432/shipyard
      SHIPYARD_API_BIND: 0.0.0.0:8080
      SHIPYARD_AUTH_DOMAIN: localhost
      SHIPYARD_AUTH_URL: http://localhost:8080/v1/auth/login
      RUST_LOG: shipyard_api=info,tower_http=info
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  worker:
    build:
      context: ..
      dockerfile: deploy/rust.Dockerfile
      args:
        BIN: shipyard-worker
    environment:
      DATABASE_URL: postgres://shipyard:shipyard@postgres:5432/shipyard
      RUST_LOG: shipyard_worker=info
    depends_on:
      postgres:
        condition: service_healthy

  dvm:
    build:
      context: ..
      dockerfile: deploy/rust.Dockerfile
      args:
        BIN: shipyard-dvm
    environment:
      DATABASE_URL: postgres://shipyard:shipyard@postgres:5432/shipyard
      SHIPYARD_DVM_RELAYS: wss://relay.damus.io,wss://relay.primal.net
      SHIPYARD_DVM_SECRET_KEY: "1111111111111111111111111111111111111111111111111111111111111111"
      RUST_LOG: shipyard_dvm=info
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: deploy/web.Dockerfile
    environment:
      PUBLIC_SHIPYARD_API_URL: http://localhost:8080
      PUBLIC_SHIPYARD_AUTH_DOMAIN: localhost
      PUBLIC_SHIPYARD_AUTH_URL: http://localhost:8080/v1/auth/login
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres-data:
