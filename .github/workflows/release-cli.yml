name: release-cli

on:
  push:
    tags:
      - "shipyard-cli-v*"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --bin shipyard --target ${{ matrix.target }}
      - name: Package artifact
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/shipyard* dist/ || true
          shasum -a 256 dist/* > dist/SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: shipyard-${{ matrix.target }}
          path: dist
